<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>do. — Hi-fi designs</title>
<meta name="viewport" content="width=1400" />
<style>
  html, body { margin: 0; padding: 0; background: #0a0b0d; color: #f4f4f2; font-family: Inter, system-ui, sans-serif; height: 100%; }
  #root { height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="hifi-system.jsx"></script>
<script type="text/babel" src="hifi-1-stream.jsx"></script>
<script type="text/babel" src="hifi-2-board.jsx"></script>
<script type="text/babel" src="hifi-3-day.jsx"></script>
<script type="text/babel" src="hifi-4-triage.jsx"></script>
<script type="text/babel" src="hifi-5-mobile.jsx"></script>

<script type="text/babel" data-presets="env,react">
  function App() {
    const [tweaks, setTweaks] = useTweaks(/*EDITMODE-BEGIN*/{
      "accent": "bronze",
      "density": "comfortable"
    }/*EDITMODE-END*/);

    // Accent override
    React.useEffect(() => {
      const accents = {
        bronze:  { a: '#c8893f', soft: '#3a2a18', line: '#5a3e1e' },
        steel:   { a: '#6d89a8', soft: '#1c2838', line: '#2a3a54' },
        oxblood: { a: '#a14545', soft: '#301818', line: '#5a2020' },
        forest:  { a: '#4a7a5e', soft: '#15221b', line: '#254838' },
      };
      const a = accents[tweaks.accent] || accents.bronze;
      // Patch CSS variables via injected style
      let s = document.getElementById('hf-accent-override');
      if (!s) { s = document.createElement('style'); s.id = 'hf-accent-override'; document.head.appendChild(s); }
      s.textContent = `
        .hf-root .hf-ai-text, .hf-root .hf-ai-fill .hf-mono { color: ${a.a} !important; }
        .hf-root .hf-ai-fill { background: linear-gradient(135deg, ${a.soft}, #151515) !important; border-color: ${a.line} !important; }
        .hf-root .hf-check-done { background: ${a.a} !important; border-color: ${a.a} !important; }
        .hf-root .hf-btn-primary { background: linear-gradient(180deg, ${a.a}, ${a.line}) !important; border-color: ${a.line} !important; color: #1a1108 !important; }
      `;
    }, [tweaks.accent]);

    return (
      <>
        <DesignCanvas title="do. — Hi-fi directions">
          <DCSection id="desktop" title="Desktop views">
            <DCArtboard id="s1" label="1 · Unified stream (flagship)" width={1400} height={900}>
              <HF1_Stream />
            </DCArtboard>
            <DCArtboard id="s2" label="2 · Board by priority" width={1400} height={900}>
              <HF2_Board />
            </DCArtboard>
            <DCArtboard id="s3" label="3 · Day / timeline" width={1400} height={900}>
              <HF3_Day />
            </DCArtboard>
            <DCArtboard id="s4" label="4 · Triage inbox (needs-reply focus)" width={1400} height={900}>
              <HF4_Triage />
            </DCArtboard>
          </DCSection>
          <DCSection id="mobile" title="Mobile (iOS)">
            <DCArtboard id="m1" label="5 · Mobile — stream + draft reply" width={390} height={844}>
              <HF5_Mobile />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>

        <TweaksPanel title="Tweaks">
          <TweakSection title="Global">
            <TweakRadio
              label="Accent color"
              value={tweaks.accent}
              onChange={v => setTweaks({ accent: v })}
              options={[
                { value: 'bronze', label: 'Bronze (default)' },
                { value: 'steel', label: 'Steel blue' },
                { value: 'oxblood', label: 'Oxblood' },
                { value: 'forest', label: 'Forest' },
              ]}
            />
          </TweakSection>
        </TweaksPanel>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
